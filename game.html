<!doctype html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <!-- Cross-document view transitions break on file:// (each path is an opaque origin); Chromium then logs "Unsafe attempt to load URL ... from frame". -->
  <meta name="view-transition" content="same-origin" id="risque-view-transition-meta" />
  <script>
    (function () {
      try {
        if (location.protocol === "file:") {
          document.documentElement.classList.add("risque-file-origin");
          var m = document.getElementById("risque-view-transition-meta");
          if (m && m.parentNode) m.parentNode.removeChild(m);
        }
      } catch (e) { /* ignore */ }
    })();
  </script>
  <title>RISQUE Runtime</title>
  <script>
    (function () {
      try {
        /* file://: some builds expose an empty location.search while href still has ?display=public — use URL(href). */
        var q = new URL(window.location.href).searchParams;
        var disp = String(q.get("display") || "").toLowerCase();
        window.risqueDisplayIsPublic = disp === "public";
        window.risqueDisplayMode = window.risqueDisplayIsPublic ? "public" : "host";
        if (window.risqueDisplayIsPublic && window.opener && !window.opener.closed) {
          try {
            window.opener.__risquePublicBoardWindow = window;
          } catch (eReg) {
            /* ignore */
          }
        }
      } catch (e) {
        window.risqueDisplayIsPublic = false;
        window.risqueDisplayMode = "host";
      }
    })();
  </script>
  <script>
    (function () {
      /* scripts\\RISQUE.bat (local): URLs carry replayDebug=1 so REPLAY / merge logs work with zero setup. */
      try {
        var rd = new URL(window.location.href).searchParams.get("replayDebug");
        if (rd === "1") {
          try {
            localStorage.setItem("risqueReplayDebug", "1");
          } catch (eLs) {}
          console.info("[ReplayDebug] on — tape/merge/play logs; off: RISQUE.bat -NoReplayDebug or env RISQUE_NO_REPLAY_DEBUG=1");
        } else if (rd === "0") {
          try {
            localStorage.removeItem("risqueReplayDebug");
          } catch (eLs2) {}
        }
      } catch (eRd) {}
    })();
  </script>
  <!-- Black root only; phase changes use cross-document view transitions (Chromium) for cross-dissolve -->
  <style>

    }
  </style>
  <link rel="stylesheet" href="game.css?v=pastel-blue-player-2026-05-06" />
  <script>
    (function () {
      try {
        /* file://: keep navigation:none — cross-doc view transitions break on opaque origins. */
        if (location.protocol === "file:") {
          var st = document.createElement("style");
          st.setAttribute("data-risque-vt-file-disable", "1");
          st.textContent = "@view-transition { navigation: none !important; }";
          document.head.appendChild(st);
        }
      } catch (e) {
        /* ignore */
      }
    })();
  </script>
  <!--
    http(s): game.css uses @view-transition { navigation: auto } so Chromium holds a snapshot of the
    outgoing page (map + HUD) until the incoming game.html paints — avoids empty map/panel mid-load.
    Privacy/setup flows on file:// match the no-VT behavior via the script above + meta removal.
  -->

      display: none !important;

  </style>
  <script>
    (function () {
      try {
        var q = new URL(window.location.href).searchParams;
        var p = q.get("phase");
        /* Match html root: avoid slate flash before login UI paints */
        if (p === "login") {
          var boot = document.createElement("style");
          boot.textContent = "body.runtime-page { background: #000 !important; }";
          document.head.appendChild(boot);
        }
        var full = [
          "playerSelect",
          "deal",
          "deploy",
          "deploy1",
          "deploy2",
          "attack",
          "reinforce",
          "receivecard",
          "postgame",
          "con-income",
          "conquer",
          "privacyGate"
        ];
        if (p && full.indexOf(p) !== -1) {
          document.addEventListener("DOMContentLoaded", function () {
            document.body.classList.add("pre-fullstage");
          });
        }
      } catch (e) {
        /* ignore */
      }
    })();
  </script>

<body class="runtime-page">
  <script>
    (function () {
      var pub = !!window.risqueDisplayIsPublic;
      document.documentElement.classList.add(pub ? "risque-view-public" : "risque-view-host");
      document.body.classList.add(pub ? "risque-view-public" : "risque-view-host");
    })();
  </script>
  <script>
    (function () {
      try {
        if (window.risqueDisplayIsPublic) return;
        var q = new URL(window.location.href).searchParams;
        if (q.get("postReceive") !== "1") return;
        if (sessionStorage.getItem("risquePostReceiveCardplayBlackout") !== "1") return;
        if (document.getElementById("risque-post-receive-blackout")) return;
        var st = document.createElement("style");
        st.id = "risque-post-receive-blackout-early-inline";
        st.textContent =
          "#risque-post-receive-blackout{position:fixed;inset:0;z-index:2147483647;margin:0;padding:0;" +
          "background:#000;pointer-events:none}";
        document.head.appendChild(st);
        var d = document.createElement("div");
        d.id = "risque-post-receive-blackout";
        d.setAttribute("aria-hidden", "true");
        document.body.appendChild(d);
      } catch (e) {
        /* ignore */
      }
    })();
  </script>

  <div id="risque-public-tv-bar" class="risque-public-tv-bar" aria-label="Public display">
    <span class="risque-public-tv-bar-label">TV view</span>
    <button
      type="button"
      id="risque-public-fullscreen-btn"
      class="risque-public-fullscreen-btn"
      title="Fill the screen (browser fullscreen, like F11)"
    >
      Fullscreen
    </button>
  </div>
  <script>
    (function () {
      if (!window.risqueDisplayIsPublic) return;

      var TV_PING_STORAGE_KEY = "risquePublicTvCommand";

      function wirePublicFullscreen() {
        var btn = document.getElementById("risque-public-fullscreen-btn");
        var bar = document.getElementById("risque-public-tv-bar");
        if (!btn) return;

        function syncLabel() {
          var fs = document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
          btn.textContent = fs ? "Exit fullscreen" : "Fullscreen";
          btn.setAttribute("aria-pressed", fs ? "true" : "false");
          if (bar && fs) bar.removeAttribute("data-risque-pending-fullscreen");
        }

        function requestFullscreenDoc() {
          var doc = document.documentElement;
          var req = doc.requestFullscreen || doc.webkitRequestFullscreen || doc.msRequestFullscreen;
          if (!req) return Promise.reject();
          return Promise.resolve(req.call(doc)).then(syncLabel);
        }

        function exitFullscreenDoc() {
          var ex = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
          if (!ex) return Promise.resolve();
          return Promise.resolve(ex.call(document)).then(syncLabel);
        }

        function toggleFullscreenFromGesture() {
          var fs = document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
          if (!fs) {
            return requestFullscreenDoc().catch(function () {});
          }
          return exitFullscreenDoc().catch(function () {});
        }

        btn.addEventListener("click", function () {
          toggleFullscreenFromGesture();
        });

        document.addEventListener("fullscreenchange", syncLabel);
        document.addEventListener("webkitfullscreenchange", syncLabel);
        document.addEventListener("MSFullscreenChange", syncLabel);
        syncLabel();

        function setPendingFullscreenUi(on) {
          if (!bar) return;
          if (on) bar.setAttribute("data-risque-pending-fullscreen", "1");
          else bar.removeAttribute("data-risque-pending-fullscreen");
        }

        function armOneClickFullscreen() {
          setPendingFullscreenUi(true);
          function onFirstPointer() {
            document.removeEventListener("pointerdown", onFirstPointer, true);
            setPendingFullscreenUi(false);
            var fs = document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
            if (!fs) {
              requestFullscreenDoc().catch(function () {});
            }
          }
          document.addEventListener("pointerdown", onFirstPointer, true);
        }

        function consumeTvFullscreenQuery() {
          try {
            var u = new URL(window.location.href);
            if (u.searchParams.get("risqueTvFullscreen") !== "1" && u.searchParams.get("tvFullscreen") !== "1") {
              return false;
            }
            u.searchParams.delete("risqueTvFullscreen");
            u.searchParams.delete("tvFullscreen");
            history.replaceState(null, "", u.href);
            return true;
          } catch (e) {
            return false;
          }
        }

        if (consumeTvFullscreenQuery()) {
          armOneClickFullscreen();
        }

        function isHttpLike() {
          return window.location.protocol === "http:" || window.location.protocol === "https:";
        }

        if (isHttpLike()) {
          window.addEventListener("storage", function (ev) {
            if (!ev.key || ev.key !== TV_PING_STORAGE_KEY) return;
            var raw = ev.newValue;
            if (!raw) return;
            try {
              var o = JSON.parse(raw);
              if (!o || String(o.action || "") !== "fullscreen") return;
            } catch (eSt) {
              return;
            }
            armOneClickFullscreen();
          });
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", wirePublicFullscreen);
      } else {
        wirePublicFullscreen();
      }
    })();
  </script>
